name: termisol
description: "Cross-platform terminal emulator with AI integration"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  xterm:
    path: packages/xterm
  dartssh2: ^2.17.1
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  http: ^1.3.0
  window_manager: ^0.4.0
  url_launcher: ^6.2.1
  google_fonts: ^6.2.1
  flutter_highlight: ^0.7.0
  path: ^1.9.0
  audioplayers: ^6.1.0
  file_picker: ^8.1.2
  pty:
    path: packages/pty
   stack_trace: ^1.11.1
   postgres: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/profiles/
    - assets/icons/
  fonts:
    - family: DroidSansMono
      fonts:
        - asset: assets/fonts/DroidSansMono-Regular.ttf
