name: termisol
description: "Cross-platform terminal emulator with AI integration"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  audioplayers: ^6.1.0
  collection: any
  crypto: any
  dartssh2: ^2.17.1
  ffi: any
  file_picker: ^8.1.2
  flutter:
    sdk: flutter
  flutter_highlight: ^0.7.0
  flutter_secure_storage: ^10.1.0
  google_fonts: ^6.2.1
  http: ^1.3.0
  logging: any
  path: ^1.9.0
  path_provider: ^2.1.5
  postgres: any
  pty:
    path: packages/pty
  shared_preferences: ^2.5.5
  speech_to_text: ^7.0.0
  stack_trace: ^1.11.1
  url_launcher: ^6.2.1
  window_manager: ^0.4.0
  xterm:
    path: packages/xterm

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  test: ^1.24.0

flutter:
  uses-material-design: true
  assets:
    - assets/profiles/
    - assets/icons/
  fonts:
    - family: DroidSansMono
      fonts:
        - asset: assets/fonts/DroidSansMono-Regular.ttf
