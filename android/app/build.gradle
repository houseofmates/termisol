plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.termisol"
    compileSdkVersion 36  // Updated for newer dependencies
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    lint {
        disable 'Instantiatable'  // Disable instantiatable lint check
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.termisol"
        minSdkVersion 29  // Quest 2 minimum
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // VR-specific configurations
        manifestPlaceholders = [
            'appLabel': 'Termisol VR',
            'vrCategory': 'com.oculus.intent.category.VR'
        ]

        ndk {
            abiFilters 'arm64-v8a'  // Quest 2 is 64-bit only
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }

        // VR-specific build type
        vrRelease {
            initWith release
            applicationIdSuffix '.vr'
            manifestPlaceholders = [
                'appLabel': 'Termisol VR',
                'vrMode': 'true'
            ]
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:\$kotlin_version"

    // Oculus Mobile VR SDK for Quest support
    implementation 'com.meta.quest:vr-sdk:1.0.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
