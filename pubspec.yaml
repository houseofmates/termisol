name: termisol
description: "Config-driven cross-platform terminal emulator with GPU acceleration and NVIDIA AI integration"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  xterm: ^4.0.0
  dartssh2: ^2.17.1
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  http: ^1.1.0
  postgres: ^3.0.0
  yaml: ^3.1.3
  json_annotation: ^4.8.1
  material_color_utilities: ^0.13.0
  logging: ^1.2.0
  intl: ^0.19.0
  window_manager: ^0.3.7
  url_launcher: ^6.2.1
  permission_handler: ^11.0.1
  collection: ^1.18.0
  google_fonts: ^6.2.1
  flutter_highlight: ^0.7.0
  path: ^1.8.3
  process_run: ^0.14.2
  speech_to_text: ^6.3.0
  audioplayers: ^5.2.1
   file_picker: ^5.0.1
  web_socket_channel: ^2.4.0
  pty:
    path: packages/pty

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0
  mockito: ^5.4.4

scripts:
  test: flutter test --coverage
  test:ci: flutter test --coverage --test-randomize-ordering-seed random
  test:unit: flutter test test/unit/
  test:integration: flutter test test/integration/
  test:performance: flutter test test/performance/
  test:production: flutter test test/production/
  analyze: flutter analyze
  format: dart format .
  ci: flutter analyze && flutter test --coverage

flutter:
  uses-material-design: true
  assets:
    - assets/profiles/
    - assets/icons/
