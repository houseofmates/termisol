name: termisol
description: "Config-driven cross-platform terminal emulator with GPU acceleration and NVIDIA AI integration"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  xterm:
    path: packages/xterm
  dartssh2: ^2.17.1
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  http: ^1.3.0
  postgres: ^3.0.0
  yaml: ^3.1.3
  json_annotation: ^4.8.1
  logging: ^1.2.0
  intl: ^0.19.0
  window_manager: ^0.4.0
  url_launcher: ^6.2.1
  permission_handler: ^11.0.1
  collection: ^1.18.0
  google_fonts: ^6.2.1
  flutter_highlight: ^0.7.0
  path: ^1.9.0
  process_run: ^0.14.2
  speech_to_text: ^7.0.0
  audioplayers: ^6.1.0
  file_picker: ^8.1.2
  web_socket_channel: ^2.4.0
  device_info_plus: ^10.0.0
  system_info2: ^4.0.0
  pty:
    path: packages/pty
  # Security and crypto packages
  crypto: ^3.0.3
  convert: ^3.1.1
  pointycastle: ^4.0.0
  # Performance and optimization
  flutter_rust_bridge: ^2.0.0
  # Enhanced logging
  stack_trace: ^1.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/profiles/
    - assets/icons/
  fonts:
    - family: DroidSansMono
      fonts:
        - asset: assets/fonts/DroidSansMono-Regular.ttf
